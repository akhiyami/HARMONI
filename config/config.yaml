# Memory Module Configuration
memory:
  closed_vocabulary: True
  vocabulary:
    Personality: "The user's personality traits, character, and behavior."
    Interests: "The user's interests."
    Employment: "The user's professional information, including their current job and career path."
    Education: "The user's educational background, including institutions attended and degrees earned."
    Family: "The user's family members, including family relationships and dynamics."
    Relationships: "The user's interpersonal relationships, including friends, colleagues, and acquaintances."
    Hobbies: "The user's leisure activities and hobbies, including sports, arts, and travel."
    Health: "Information about the user's health, including medical conditions and general well-being."
    Schedule: "The user's schedule, including work and personal commitments." 
    Habits: "The user's habits, including daily routines and repetitive behaviors."
    Diet: "The user's eating habits, including preferences, allergies, and dietary restrictions."
    Technology: "The user's relationship with technology, including the devices used and digital skills."



#llm configuration
reply-llm:
  model: "llama3"
  temperature: 0
  max_tokens: -1
memory-llm:
  model: "llama3"
  temperature: 0
  max_tokens: -1
