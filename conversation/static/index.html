<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <h1>Assistant Virtuel</h1>

    <!-- Section utilisateur : image et profil -->
    <div id="user_info">
        
        <!-- User image and selection button -->
        <div id="user">
            <div id="user_placeholder" class="user-image-box">
                <img src="static/image_pholder.png" alt="Image de l'utilisateur actif">
            </div>
            <img id="preview" src="" alt="Image de l'utilisateur actif">

            <div class="user-label-container">
                <label for="imageInput" class="user-label">
                    Utilisateur actif
                    <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect(event)">
                </label>
            </div>
        </div>
        
        <!-- User profile (live updated) -->
        <div id="profile">
            <h3 style="margin:0; padding:0.5rem">A propos :</h3>
            <span id="live_profile"></span>
        </div>

    </div>

    <!-- Chatbox (conversation session) -->
    <div id="chatbox"></div>

    <!-- Chat form for user input -->
    <form id="chat-form">
        <input type="text" id="question" required placeholder="Entrez votre question...">
        <button type="submit" class="submit" >
            Envoyer
        </button>
    </form>

    <!-- Script for dynamic behavior -->
    <script>
        //dynamic style
        const user_field= document.getElementById("user");
        const profile = document.getElementById("profile");
        profile.style.height = `${user_field.offsetHeight}px`;

        //constants
        const chatbox = document.getElementById("chatbox");
        const form = document.getElementById("chat-form");
        const questionInput = document.getElementById("question");
        const live_profile = document.getElementById("live_profile");

        //global variables
        let userId = ""; // Default user ID

        // Empty the chat form input
        questionInput.value = ""

        // Event listener for form submission
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const question = questionInput.value.trim();
            const user = userId; 

            questionInput.value = "";

            if (!user) {
                addMessage("Erreur", "Veuillez sélectionner un utilisateur actif.", "error");
                questionInput.value = ""
                return;
            }

            if (!question) return;

            addMessage(user, question, "user");

            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({question, user})
            });

            const data = await response.json();
            if (data.answer) {
                addMessage("Assistant", data.answer, "bot");
            } else {
                addMessage("Erreur", data.error || "Erreur inconnue", "bot");
            }

            if (!data.profile) {
                live_profile.innerHTML = "";
            } else {
                // Separate primary and contextual items
                const primary = data.profile.filter(item => item.type === "primary");
                const contextual = data.profile.filter(item => item.type === "contextual");

                let html = "";
                if (primary.length > 0) {
                    html += primary.map(
                        item => `<b>${item.name}:</b> </br>${item.value}`
                    ).join('<br>');
                }
                if (contextual.length > 0) {
                    if (primary.length > 0) html += "<br>----------<br>";
                    html += contextual.map(
                        item => `<b>${item.name}:</b> <span style="color:gray"><em>(${item.description})</em></span> </br>${item.value} </br><em><span style="color:blue">${item.tags.join(', ')}</span></em>`
                    ).join('<br>');
                }
                live_profile.innerHTML = html;
            }
            
        });

        // Function to add a message to the chatbox
        function addMessage(sender, text, role) {
            const div = document.createElement("div");
            div.className = `msg ${role}`;
            div.textContent = `${sender}: ${text}`;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        // Function to handle image selection and update user profile
        function handleImageSelect(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('preview');
            const userPlaceholder = document.getElementById('user_placeholder');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'inline';
                    userPlaceholder.style.display = 'none';

                    const formData = new FormData();
                    formData.append('image', file);

                    fetch('/set_user', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        addMessage("Change user", data.user_id, "system");
                        userId = data.user_id; 

                        if (!data.profile) {
                            live_profile.innerHTML = "";
                        } else {
                            const primary = data.profile.filter(item => item.type === "primary");
                            const contextual = data.profile.filter(item => item.type === "contextual");

                            let html = "";
                            if (primary.length > 0) {
                                html += primary.map(
                                    item => `<b>${item.name}:</b> </br>${item.value}`
                                ).join('<br>');
                            }
                            if (contextual.length > 0) {
                                if (primary.length > 0) html += "<br>----------<br>";
                                html += contextual.map(
                                    item => `<b>${item.name}:</b> <span style="color:gray"><em>(${item.description})</em></span> </br>${item.value} </br><em><span style="color:blue">${item.tags.join(', ')}</span></em>`
                                ).join('<br>');
                            }
                            live_profile.innerHTML = html;
                        }
                        
                    })
                    .catch(error => {
                        console.error('Error setting user:', error);
                        addMessage("Erreur", "Erreur lors de la mise à jour de l'utilisateur actif.", "error");
                    });
                };
                reader.readAsDataURL(file);
            } else {
                preview.src = '';
                preview.style.display = 'none';
            }
        }
    </script>

</body>

</html>
